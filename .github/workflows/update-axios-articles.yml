name: Update Axios articles

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update articles
        run: npm run update:articles

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No article updates found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/axios-feed package.json scripts/update-axios-feed.mjs
          git commit -m "Update Axios articles"
          git push
